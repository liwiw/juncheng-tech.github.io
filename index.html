<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郡城智能科技 - AI 智能体解决方案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; line-height: 1.6; color: #333; }
        
        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url('images/hero-bg.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.5rem; margin-bottom: 2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .hero-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .hero-btn:hover { transform: translateY(-3px); }
        
        /* Products Section */
        .products { padding: 5rem 2rem; background: #f8f9fa; }
        .products h2 { text-align: center; font-size: 2.5rem; margin-bottom: 3rem; color: #333; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-img {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        .product-info { padding: 1.5rem; }
        .product-info h3 { margin-bottom: 0.5rem; color: #333; }
        .product-info p { color: #666; margin-bottom: 1rem; }
        
        /* Footer */
        footer { background: #333; color: white; text-align: center; padding: 2rem; }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h1>郡城智能科技</h1>
            <p>AI 智能体解决方案 · 让工作更智能</p>
            <a href="#products" class="hero-btn">了解我们的服务</a>
        </div>
    </section>
    
    <!-- Products Section -->
    <section class="products" id="products">
        <h2>我们的服务</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">🤖</div>
                <div class="product-info">
                    <h3>AI 智能体开发</h3>
                    <p>基于 OpenClaw 框架，定制化开发企业智能体</p>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">🎨</div>
                <div class="product-info">
                    <h3>LOGO 设计</h3>
                    <p>通义万相 AI 设计，专业高效</p>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">⚙️</div>
                <div class="product-info">
                    <h3>工业自动化</h3>
                    <p>PLC、SCADA、MES 系统集成</p>
                </div>
            </div>
        </div>
    </section>
    
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 郡城智能科技。All rights reserved.</p>
        <p>联系我们：太一 | 烟台</p>
    </footer>
</body>
</html>
